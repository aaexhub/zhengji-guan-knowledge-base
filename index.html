<script>
// ========== State ==========
let currentPage = 'home';
let currentCategory = '全部';
let currentCatTab = 0;
let checklistSide = 'positive';
let expandedRel = -1;

// ========== localStorage 用户数据管理 ==========
const LS_KEY = 'zhengjiguan_user_added';
const LS_EXT_KEY = 'zhengjiguan_user_extlinks';

function getUserAdded() {
  try {
    return JSON.parse(localStorage.getItem(LS_KEY)) || [];
  } catch(e) { return []; }
}

function saveUserAdded(items) {
  localStorage.setItem(LS_KEY, JSON.stringify(items));
}

function getUserExtLinks() {
  try {
    return JSON.parse(localStorage.getItem(LS_EXT_KEY)) || [];
  } catch(e) { return []; }
}

function saveUserExtLinks(items) {
  localStorage.setItem(LS_EXT_KEY, JSON.stringify(items));
}

function addUserItem(item) {
  const items = getUserAdded();
  item.id = 'user_' + Date.now();
  item.addedAt = new Date().toISOString();
  items.unshift(item);
  saveUserAdded(items);
  return item;
}

function removeUserItem(id) {
  const items = getUserAdded().filter(i => i.id !== id);
  saveUserAdded(items);
}

function addUserExtLink(link) {
  const links = getUserExtLinks();
  link.id = 'uext_' + Date.now();
  link.addedAt = new Date().toISOString();
  link.is_default = false;
  links.unshift(link);
  saveUserExtLinks(links);
  return link;
}

function removeUserExtLink(id) {
  const links = getUserExtLinks().filter(i => i.id !== id);
  saveUserExtLinks(links);
}

function getAllExtLinks() {
  const defaults = (KB_DATA.external_links || []).filter(l => l.is_default !== false);
  const userLinks = getUserExtLinks();
  return [...defaults, ...userLinks];
}

function getAllArticles() {
  return KB_DATA.articles; // 用户添加功能已禁用
}

function getArticlesByCategory(cat) {
  if (cat === '全部') return getAllArticles();
  return getAllArticles().filter(a => a.category === cat);
}

function getUserAddedCount() {
  return 0; // 用户添加功能已禁用
}

function getUserExtLinksCount() {
  return getUserExtLinks().length;
}

// ========== Helpers ==========
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

function setActiveNav(page) {
  $$('.nav-link').forEach(n => n.classList.toggle('active', n.dataset.page === page));
}

function highlightText(text, keyword) {
  if (!keyword) return text;
  const esc = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${esc})`, 'gi'), '<span class="search-highlight">$1</span>');
}

function searchArticles(keyword) {
  if (!keyword.trim()) return [];
  const kw = keyword.trim().toLowerCase();
  return getAllArticles().filter(a =>
    a.title.toLowerCase().includes(kw) ||
    (a.content && a.content.toLowerCase().includes(kw)) ||
    a.summary.toLowerCase().includes(kw)
  );
}

function getCatById(id) {
  return KB_DATA.categories.find(c => c.id === id);
}

function showToast(msg, isError) {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast' + (isError ? ' error' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

function isUserItem(id) { return id && id.startsWith('user_'); }
function isUserExt(id) { return id && id.startsWith('uext_'); }

// ========== Category counts with user data ==========
function getCatCounts() {
  const counts = {};
  getAllArticles().forEach(a => { counts[a.category] = (counts[a.category]||0) + 1; });
  return counts;
}

// ========== Page Renderers ==========

function showHome() {
  currentPage = 'home';
  setActiveNav('home');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  
  const cats = [
    { name: '理论文章', icon: '📰', color: 'from-red-500 to-red-700', desc: '人民日报评论、新华社长文等权威解读' },
    { name: '学习材料', icon: '📋', color: 'from-amber-500 to-amber-700', desc: '正负面清单、五对关系等结构化材料' },
    { name: '交流发言', icon: '🎤', color: 'from-blue-500 to-blue-700', desc: '发言提纲、学习体会、交流材料' },
    { name: '政策部署', icon: '🏛️', color: 'from-purple-500 to-purple-700', desc: '党中央部署通知、学习教育方案' },
  ];
  
  const catCount = getCatCounts();
  const userCount = getUserAddedCount();
  const totalArticles = getAllArticles().length;
  const totalExtLinks = getAllExtLinks().length;

function renderArticleCard(a, keyword='') {
  const catColors = {
    '理论文章': 'bg-red-50 text-red-700',
    '学习材料': 'bg-amber-50 text-amber-700',
    '交流发言': 'bg-blue-50 text-blue-700',
    '政策部署': 'bg-purple-50 text-purple-700',
  };
  const title = keyword ? highlightText(a.title, keyword) : a.title;
  const summary = keyword ? highlightText(a.summary, keyword) : a.summary;
  const isUser = isUserItem(a.id);
  const isExt = a.isExternal;
  const wordCount = a.wordCount || (a.content ? a.content.length : 0);
  const source = a.source || '用户添加';

  if (isExt || a.url) {
    return `
    <div class="card-hover bg-white rounded-xl p-5 shadow-sm border border-gray-100"
         onclick="window.open('${a.url}', '_blank')">
      <div class="flex items-start justify-between gap-3">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-2 flex-wrap">
            ${isUser ? '<span class="user-badge">✨ 新增</span>' : ''}
            <span class="text-xs text-gray-400">${source}</span>
          </div>
          <h3 class="font-semibold text-base mb-1 truncate" style="color:var(--dark)">🔗 ${title}</h3>
          <p class="text-sm text-gray-500 line-clamp-2">${a.description || summary || a.url}</p>
        </div>
        <svg class="w-5 h-5 text-gray-300 flex-shrink-0 mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
        </svg>
      </div>
    </div>`;
  }

  return `
    <div class="card-hover bg-white rounded-xl p-5 shadow-sm border border-gray-100"
         onclick="${isUser ? "showArticle('" + a.id + "')" : "showArticle('" + a.id + "', '')"}">
      <div class="flex items-start justify-between gap-3">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-2 flex-wrap">
            <span class="text-xs px-2 py-0.5 rounded-full ${catColors[a.category]||'bg-gray-100 text-gray-600'}">${a.category}</span>
            ${isUser ? '<span class="user-badge">✨ 新增</span>' : ''}
            <span class="text-xs text-gray-400">${source}</span>
            <span class="text-xs text-gray-400">${wordCount}字</span>
          </div>
          <h3 class="font-semibold text-base mb-1 truncate" style="color:var(--dark)">${title}</h3>
          <p class="text-sm text-gray-500 line-clamp-2">${summary}</p>
        </div>
        <div class="flex items-center gap-1 flex-shrink-0 mt-1">
          ${isUser ? `<button class="btn-danger" onclick="event.stopPropagation();confirmDeleteUserItem('${a.id}')" title="删除">🗑</button>` : ''}
          <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </div>
      </div>
    </div>
  `;
}

function confirmDeleteUserItem(id) {
  if (confirm('确定删除这条用户添加的材料吗？')) {
    removeUserItem(id);
    showToast('已删除');
    showHome();
  }
}

function handleHomeSearch(val) {
  const results = document.querySelector('#searchResults');
  if (!val.trim()) {
    results.classList.add('hidden');
    document.querySelector('#homeArticleList').classList.remove('hidden');
    return;
  }
  document.querySelector('#homeArticleList').classList.add('hidden');
  results.classList.remove('hidden');
  const found = searchArticles(val);
  if (found.length === 0) {
    results.innerHTML = '<div class="text-center text-gray-400 py-8">未找到相关内容</div>';
    return;
  }
  results.innerHTML = `
    <div class="mb-2 text-sm text-gray-500">找到 ${found.length} 篇相关文章</div>
    <div class="grid gap-3">${found.map(a => renderArticleCard(a, val)).join('')}</div>
  `;
}

function showArticles(cat) {
  currentPage = 'articles';

}

          oninput="handleArticleSearch(this.value)">
      </div>
      
      <div class="grid gap-3" id="articleList">

      </div>
    </div>

function handleArticleSearch(val) {
  const list = document.querySelector('#articleList');
  if (!val.trim()) {
    const articles = getArticlesByCategory(currentCategory);
    list.innerHTML = articles.length ? articles.map(a => renderArticleCard(a)).join('') :
      '<div class="text-center text-gray-400 py-12">该分类暂无文章</div>';
    return;
  }
  const kw = val.trim().toLowerCase();
  const base = getArticlesByCategory(currentCategory);
  const found = base.filter(a =>
    a.title.toLowerCase().includes(kw) || (a.content && a.content.toLowerCase().includes(kw)) || a.summary.toLowerCase().includes(kw)
  );
  list.innerHTML = found.length ? found.map(a => renderArticleCard(a, val)).join('') :
    '<div class="text-center text-gray-400 py-8">未找到匹配内容</div>';
}

function showArticle(id, keyword) {
  // 先从内置数据查找，再从用户数据查找
  let article = KB_DATA.articles.find(a => a.id === id);
  if (!article) {
    article = getUserAdded().find(a => a.id === id);
  }
  if (!article) return;
  currentPage = 'article';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  
  const content = article.content || article.summary || '';
  let html = keyword ? highlightText(content, keyword) : content;
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  html = '<p>' + html + '</p>';
  
  const catColors = {
    '理论文章': 'bg-red-50 text-red-700',
    '学习材料': 'bg-amber-50 text-amber-700',
    '交流发言': 'bg-blue-50 text-blue-700',
    '政策部署': 'bg-purple-50 text-purple-700',
  };
  
  const isUser = isUserItem(id);
  const wordCount = article.wordCount || (article.content ? article.content.length : 0);
  const source = article.source || '用户添加';

  // 相关文章
  const relatedArticles = getAllArticles().filter(a => a.id !== id && a.category === article.category && !isUserItem(a.id) && !a.isExternal).slice(0, 4);
  
  document.querySelector('#app').innerHTML = `
    <div class="fade-in">
      <button onclick="showArticles('${article.category}')" 
        class="flex items-center gap-2 text-sm text-gray-500 hover:text-[var(--red)] mb-6 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        返回文章列表
      </button>
      
      <article class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-10">
        <div class="flex items-center gap-2 mb-4 flex-wrap">
          <span class="text-xs px-2 py-0.5 rounded-full ${catColors[article.category]||'bg-gray-100 text-gray-600'}">${article.category}</span>
          ${isUser ? '<span class="user-badge">✨ 新增</span>' : ''}
          <span class="text-xs text-gray-400">${source}</span>
          <span class="text-xs text-gray-400">${wordCount} 字</span>
        </div>
        <h1 class="text-xl md:text-2xl font-bold mb-6 leading-relaxed" style="color:var(--dark)">${article.title}</h1>
        <div class="gold-line mb-6"></div>
        <div class="content-body">${html}</div>
      </article>
      
      <!-- Related Articles -->
      ${relatedArticles.length > 0 ? `
      <div class="mt-8">
        <h2 class="text-lg font-bold mb-4" style="color:var(--dark)">相关文章</h2>
        <div class="grid md:grid-cols-2 gap-3">
          ${relatedArticles.map(a => renderArticleCard(a)).join('')}
        </div>
      </div>
      ` : ''}
    </div>
  `;
}

      </div>
    </div>
  `;
}

function toggleRelation(idx) {
  expandedRel = expandedRel === idx ? -1 : idx;
  renderRelationsPage();
}

// ========== Scroll Handler ==========
window.addEventListener('scroll', () => {
  const btn = document.querySelector('#scrollTopBtn');
  if (window.scrollY > 300) {
    btn.classList.add('visible');
  } else {
    btn.classList.remove('visible');
  }
});

// ========== Init ==========
showHome();
</script>
